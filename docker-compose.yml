services:
  postgres:
    image: postgres:16-alpine
    container_name: tgbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tgbot_user
      POSTGRES_PASSWORD: strong_password
      POSTGRES_DB: tgbot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgbot_user -d tgbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tgbot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: ./gatebot
      dockerfile: Dockerfile
    container_name: tgbot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
